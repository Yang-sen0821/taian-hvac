{% extends "base.html" %}

{% block title %}新增冷氣品項 - 泰安冷氣管理系統{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <!-- 返回按鈕 -->
            <div class="mb-3">
                <a href="/inventory/ac" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> 返回
                </a>
            </div>

            <!-- 標題 -->
            <h2 class="mb-4">新增冷氣品項</h2>

            <!-- 提醒訊息 -->
            <div class="alert alert-info mb-4">
                <i class="bi bi-info-circle"></i> 新增品項後，報價單即可選用此品項
            </div>

            <!-- 表單 -->
            <form method="POST" action="/inventory/ac/new" class="mb-5">
                <div class="mb-3">
                    <label for="spec" class="form-label">廠牌型號規格 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="spec" name="spec" required>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="system_qty" class="form-label">庫存數量</label>
                            <input type="number" class="form-control" id="system_qty" name="system_qty" value="0" min="0">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="actual_qty" class="form-label">實際庫存</label>
                            <input type="number" class="form-control" id="actual_qty" name="actual_qty" value="0" min="0">
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="note" class="form-label">備註</label>
                    <textarea class="form-control" id="note" name="note" rows="4"></textarea>
                </div>

                <!-- 按鈕 -->
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle"></i> 送出
                    </button>
                    <a href="/inventory/ac" class="btn btn-outline-secondary">
                        <i class="bi bi-x-circle"></i> 取消
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
