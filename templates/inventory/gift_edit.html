{% extends "base.html" %}

{% block title %}編輯贈品庫存 - 泰安冷氣管理系統{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <h1 class="mb-4">編輯贈品庫存</h1>

        <div class="card">
            <div class="card-body">
                <!-- 品名顯示（唯讀） -->
                <div class="mb-4 p-3 bg-light rounded">
                    <p class="text-muted small mb-1">品名</p>
                    <h3 class="mb-0">{{ item.name }}</h3>
                    {% if item.vendor %}
                    <p class="text-muted small mt-2 mb-0">廠商：{{ item.vendor }}</p>
                    {% endif %}
                </div>

                <!-- 編輯表單 -->
                <form method="post" action="/inventory/gifts/{{ item.id }}/edit">
                    <!-- 實際庫存數量 -->
                    <div class="mb-3">
                        <label for="qty" class="form-label">實際庫存數量 <span class="text-danger">*</span></label>
                        <input
                            type="number"
                            class="form-control"
                            id="qty"
                            name="qty"
                            value="{{ item.actual_qty }}"
                            min="0"
                            required
                        >
                        <small class="form-text text-muted">輸入目前實際庫存的數量</small>
                    </div>

                    <!-- 備註 -->
                    <div class="mb-4">
                        <label for="note" class="form-label">備註</label>
                        <textarea
                            class="form-control"
                            id="note"
                            name="note"
                            rows="4"
                            placeholder="例如：待入庫、瑕疵品、預訂..."
                        >{{ item.note or '' }}</textarea>
                        <small class="form-text text-muted">選填，用於記錄特殊狀況</small>
                    </div>

                    <!-- 按鈕組 -->
                    <div class="d-grid gap-2 d-sm-flex gap-sm-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> 儲存
                        </button>
                        <a href="/inventory/gifts" class="btn btn-outline-secondary">
                            <i class="bi bi-x-circle"></i> 取消
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
