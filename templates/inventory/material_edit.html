{% extends "base.html" %}

{% block title %}編輯材料庫存 - 泰安冷氣管理系統{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <h1 class="mb-4">編輯材料庫存</h1>

        <div class="card">
            <div class="card-body">
                <!-- 編輯表單 -->
                <form method="post" action="/inventory/materials/{{ item_id }}/edit">
                    <!-- 品名（可修改） -->
                    <div class="mb-3">
                        <label for="name" class="form-label">品名 <span class="text-danger">*</span></label>
                        <input
                            type="text"
                            class="form-control"
                            id="name"
                            name="name"
                            value="{{ item['名稱'] }}"
                            maxlength="200"
                            required
                        >
                        <small class="form-text text-muted">修改後報價單搜尋將以新品名為準</small>
                    </div>

                    <!-- 庫存數量 -->
                    <div class="mb-3">
                        <label for="qty" class="form-label">庫存數量 <span class="text-danger">*</span></label>
                        <input
                            type="number"
                            class="form-control"
                            id="qty"
                            name="qty"
                            value="{{ item.get('庫存數量', '') }}"
                            min="0"
                            required
                        >
                        <small class="form-text text-muted">輸入目前實際庫存的數量</small>
                    </div>

                    <!-- 備註 -->
                    <div class="mb-4">
                        <label for="note" class="form-label">備註</label>
                        <textarea
                            class="form-control"
                            id="note"
                            name="note"
                            rows="4"
                            placeholder="例如：待入庫、規格、供應商..."
                        >{{ item.get('備註', '') }}</textarea>
                        <small class="form-text text-muted">選填，用於記錄特殊狀況</small>
                    </div>

                    <!-- 按鈕組 -->
                    <div class="d-grid gap-2 d-sm-flex gap-sm-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> 儲存
                        </button>
                        <a href="/inventory/materials" class="btn btn-outline-secondary">
                            <i class="bi bi-x-circle"></i> 取消
                        </a>
                    </div>
                </form>

                <!-- 刪除區塊 -->
                <hr class="mt-4">
                <form method="post" action="/inventory/materials/{{ item_id }}/delete"
                      onsubmit="return confirm('確定刪除「{{ item['名稱'] }}」？此操作無法復原。')">
                    <button type="submit" class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-trash"></i> 刪除此品項
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
