{% extends "base.html" %}

{% block title %}編輯冷氣庫存 - 泰安冷氣管理系統{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <h1 class="mb-4">編輯冷氣庫存</h1>

        <div class="card">
            <div class="card-body">
                <!-- 編輯表單 -->
                <form method="post" action="/inventory/ac/{{ item.id }}/edit">
                    <!-- 品名（廠牌型號規格）可編輯 -->
                    <div class="mb-3">
                        <label for="spec" class="form-label">品名（廠牌型號規格）<span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="spec" name="spec" value="{{ item.spec }}" required>
                        <small class="form-text text-muted">冷氣品項名稱／規格</small>
                    </div>

                    <!-- 實際庫存數量 -->
                    <div class="mb-3">
                        <label for="qty" class="form-label">庫存數量 <span class="text-danger">*</span></label>
                        <input
                            type="number"
                            class="form-control"
                            id="qty"
                            name="qty"
                            value="{{ item.actual_qty or item.system_qty or 0 }}"
                            min="0"
                            required
                        >
                        <small class="form-text text-muted">目前庫存數量；出貨單確認出貨時系統會自動扣除</small>
                    </div>

                    <!-- 備註 -->
                    <div class="mb-4">
                        <label for="note" class="form-label">備註</label>
                        <textarea
                            class="form-control"
                            id="note"
                            name="note"
                            rows="4"
                            placeholder="例如：待入庫、瑕疵品、預訂..."
                        >{{ item.note or '' }}</textarea>
                        <small class="form-text text-muted">選填，用於記錄特殊狀況</small>
                    </div>

                    <!-- 按鈕組 -->
                    <div class="d-grid gap-2 d-sm-flex gap-sm-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> 儲存
                        </button>
                        <a href="/inventory/ac" class="btn btn-outline-secondary">
                            <i class="bi bi-x-circle"></i> 取消
                        </a>
                    </div>
                </form>

                <hr class="my-4">
                <!-- 刪除區塊 -->
                <form method="post" action="/inventory/ac/{{ item.id }}/delete"
                      onsubmit='return confirm({{ ("確定刪除「" ~ item.spec ~ "」？此操作無法復原。")|tojson }});'>
                    <button type="submit" class="btn btn-outline-danger">
                        <i class="bi bi-trash"></i> 刪除此品項
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
