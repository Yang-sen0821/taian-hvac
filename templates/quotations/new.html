{% extends "base.html" %}

{% block title %}新增報價單 — 泰安冷氣{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0"><i class="bi bi-file-earmark-plus"></i> 新增報價單</h2>
    <a href="/quotations/" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> 返回列表
    </a>
</div>

<form method="POST" action="/quotations/new" id="quotationForm">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}">
    <!-- 動態表單序列化後寫入此 hidden input -->
    <input type="hidden" name="payload" id="payload">

    <!-- Section 1：報價資訊 -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-light fw-semibold">
            <i class="bi bi-info-circle"></i> 報價資訊
        </div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-12 col-md-4">
                    <label for="quote_date" class="form-label fw-semibold">報價日期 <span class="text-danger">*</span></label>
                    <input type="date" class="form-control form-control-lg" id="quote_date" name="quote_date"
                           value="{{ today }}" required>
                </div>
                <div class="col-12 col-md-4">
                    <label for="company_title" class="form-label fw-semibold">公司抬頭</label>
                    <select class="form-select form-control-lg" id="company_title" name="company_title"
                            style="font-size: 1rem; padding: .5rem .75rem;">
                        <option value="">— 請選擇公司 —</option>
                        {% for c in companies %}
                        <option value="{{ c.name }}" data-tax-id="{{ c.tax_id }}">{{ c.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12 col-md-4">
                    <label for="tax_id" class="form-label fw-semibold">統一編號</label>
                    <input type="text" class="form-control form-control-lg" id="tax_id" name="tax_id"
                           placeholder="選擇公司後自動填入" readonly>
                </div>
            </div>
        </div>
    </div>

    <!-- Section 2：客戶資訊 -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-light fw-semibold">
            <i class="bi bi-person"></i> 客戶資訊
        </div>
        <div class="card-body">
            <!-- 客戶搜尋 -->
            <div class="mb-3 position-relative">
                <label for="customerSearch" class="form-label fw-semibold">搜尋現有客戶</label>
                <input type="text" class="form-control form-control-lg" id="customerSearch"
                       placeholder="輸入姓名或電話搜尋..." autocomplete="off">
                <div id="customerDropdown"
                     class="list-group position-absolute w-100 shadow-sm"
                     style="z-index: 1000; display: none; max-height: 220px; overflow-y: auto;">
                </div>
                <small class="text-muted">選擇後自動填入下方欄位，或直接手動輸入</small>
            </div>

            <div class="row g-3">
                <div class="col-12 col-md-4">
                    <label for="customer_name" class="form-label fw-semibold">客戶姓名 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control form-control-lg" id="customer_name"
                           name="customer_name" placeholder="王小明" required>
                </div>
                <div class="col-12 col-md-4">
                    <label for="customer_phone" class="form-label fw-semibold">客戶電話</label>
                    <input type="text" class="form-control form-control-lg" id="customer_phone"
                           name="customer_phone" placeholder="0912-345-678">
                </div>
                <div class="col-12 col-md-4">
                    <label for="customer_address" class="form-label fw-semibold">客戶地址</label>
                    <input type="text" class="form-control form-control-lg" id="customer_address"
                           name="customer_address" placeholder="台中市...">
                </div>
            </div>
        </div>
    </div>

    <!-- Section 3：品項明細（群組式動態表單） -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-light fw-semibold d-flex justify-content-between align-items-center">
            <span><i class="bi bi-list-ul"></i> 品項明細（依空間分組）</span>
            <button type="button" class="btn btn-sm btn-primary" id="addGroupBtn">
                <i class="bi bi-plus-lg"></i> 新增空間
            </button>
        </div>
        <div class="card-body">
            <div id="groupsContainer"></div>
            <p class="text-muted small mb-0">提示：數量可填數字（自動算金額）或文字「乙式」（金額請手動輸入）。勾選「贈品」金額歸 0。</p>
        </div>
    </div>

    <!-- Section 4：合計 -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-light fw-semibold">
            <i class="bi bi-calculator"></i> 合計
        </div>
        <div class="card-body">
            <div class="row justify-content-end">
                <div class="col-12 col-md-5">
                    <table class="table table-sm mb-0">
                        <tbody>
                            <tr>
                                <td class="text-muted">未稅合計</td>
                                <td class="text-end fw-semibold">NT$ <span id="subtotal_display">0</span></td>
                            </tr>
                            <tr>
                                <td class="text-muted">稅額 5%</td>
                                <td class="text-end fw-semibold">NT$ <span id="tax_display">0</span></td>
                            </tr>
                            <tr class="table-light border-top">
                                <td class="fw-bold">含稅總金額</td>
                                <td class="text-end">
                                    <span id="total_display"
                                          style="font-size: 1.6rem; font-weight: 700; color: #dc3545;">NT$ 0</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Section 5：其他資訊 -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-light fw-semibold">
            <i class="bi bi-calendar-event"></i> 其他資訊
        </div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-12 col-md-4">
                    <label for="install_date" class="form-label fw-semibold">預計安裝日期</label>
                    <input type="date" class="form-control form-control-lg" id="install_date"
                           name="install_date">
                </div>
                <div class="col-12 col-md-8">
                    <label for="notes" class="form-label fw-semibold">備註</label>
                    <textarea class="form-control" id="notes" name="notes" rows="3"
                              placeholder="其他注意事項或說明..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- 送出按鈕 -->
    <div class="d-grid d-md-flex justify-content-md-end gap-2 mb-5">
        <a href="/quotations/" class="btn btn-outline-secondary btn-lg">取消</a>
        <button type="submit" class="btn btn-primary btn-lg px-5">
            <i class="bi bi-check-lg"></i> 建立報價單
        </button>
    </div>
</form>

<!-- 常用空間標題 datalist（可自由打字） -->
<datalist id="spaceOptions">
    <option value="客廳"><option value="主臥"><option value="餐廳"><option value="書房">
    <option value="廚房"><option value="陽台"><option value="辦公室">
    <option value="方案一"><option value="方案二"><option value="方案三">
</datalist>

<script>
// ====================================================
// 0. 既有資料預填（new 為空，edit 由 edit.html 覆寫 INITIAL_GROUPS）
// ====================================================
window.INITIAL_GROUPS = window.INITIAL_GROUPS || [];
const SPACE_PRESETS = ['客廳','主臥','餐廳','書房','廚房','陽台','辦公室'];
// 方案預設：附加到空間標題後（如「辦公室 方案一」）
const PLAN_PRESETS = ['方案一','方案二','方案三'];
// 品項備註補助快速帶入選項
const SUBSIDY_PRESETS = ['可申請貨物稅補助','可申請汰舊換新補助','可申請原廠補助'];

// ====================================================
// 1. 公司切換 → 統編自動填入
// ====================================================
const companies = {{ companies|tojson }};
document.getElementById('company_title').addEventListener('change', function() {
    const selected = this.value;
    const taxIdInput = document.getElementById('tax_id');
    const company = companies.find(c => c.name === selected);
    taxIdInput.value = company ? (company.tax_id || '') : '';
});

// ====================================================
// 2. 群組 / 品項 動態表單
// ====================================================
const groupsContainer = document.getElementById('groupsContainer');

function formatNumber(n) { return (n || 0).toLocaleString('zh-TW'); }

// 數量是否為「純數字」（可被後端算金額）
function qtyIsNumeric(s) {
    if (s === null || s === undefined) return false;
    s = String(s).trim().replace(/,/g, '');
    if (s === '') return false;
    return !isNaN(Number(s));
}

// 建立一個品項列；data 為預填物件（可選）
function buildItemRow(data) {
    data = data || {};
    const tr = document.createElement('tr');
    tr.className = 'item-row';
    tr.innerHTML = `
        <td>
            <div class="position-relative">
                <input type="text" class="form-control item-name" autocomplete="off"
                       placeholder="打字搜尋品項…">
                <div class="list-group position-absolute w-100 shadow-sm item-dropdown"
                     style="z-index:1000; display:none; max-height:220px; overflow-y:auto;"></div>
            </div>
            <div class="mt-1 small text-danger stock-warning"></div>
        </td>
        <td><input type="text" class="form-control text-center item-qty" placeholder="2 或 乙式"></td>
        <td><input type="number" class="form-control text-end item-price" min="0" step="1" value="0"></td>
        <td><input type="number" class="form-control text-end item-amount" min="0" step="1" value="0"></td>
        <td>
            <input type="text" class="form-control item-note" placeholder="備註">
            <div class="mt-1 subsidy-presets"></div>
        </td>
        <td class="text-center">
            <input type="checkbox" class="form-check-input item-gift">
        </td>
        <td class="text-center">
            <button type="button" class="btn btn-sm btn-outline-danger del-item-btn" title="刪除品項">
                <i class="bi bi-trash"></i>
            </button>
        </td>`;
    // 預填
    tr.querySelector('.item-name').value = data.name || '';
    tr.querySelector('.item-qty').value = (data.qty_text !== undefined && data.qty_text !== null) ? data.qty_text : '';
    tr.querySelector('.item-price').value = data.unit_price || 0;
    tr.querySelector('.item-amount').value = data.amount || 0;
    tr.querySelector('.item-note').value = data.note || '';
    tr.querySelector('.item-gift').checked = !!data.is_gift;

    bindItemRow(tr);
    return tr;
}

// 綁定單列事件
function bindItemRow(tr) {
    const qtyEl   = tr.querySelector('.item-qty');
    const priceEl = tr.querySelector('.item-price');
    const amountEl= tr.querySelector('.item-amount');
    const giftEl  = tr.querySelector('.item-gift');
    const nameEl  = tr.querySelector('.item-name');
    const dd      = tr.querySelector('.item-dropdown');
    const warn    = tr.querySelector('.stock-warning');
    const noteEl  = tr.querySelector('.item-note');
    const subsidyBox = tr.querySelector('.subsidy-presets');

    // 補助選項快速帶入：點擊把文字附加到該列備註（已存在則不重複加）
    if (subsidyBox) {
        SUBSIDY_PRESETS.forEach(s => {
            const b = document.createElement('button');
            b.type = 'button';
            b.className = 'btn btn-sm btn-outline-success me-1 mb-1 py-0';
            b.style.fontSize = '11px';
            b.textContent = '+ ' + s;
            b.addEventListener('click', () => {
                const cur = noteEl.value.trim();
                if (cur.indexOf(s) !== -1) return;          // 已含則不重複
                noteEl.value = cur ? (cur + '、' + s) : s;
            });
            subsidyBox.appendChild(b);
        });
    }

    // 即時計算該列金額
    function recalcRow() {
        if (giftEl.checked) {
            amountEl.value = 0;
            amountEl.readOnly = true;
            qtyEl.disabled = true;
            priceEl.disabled = true;
        } else {
            amountEl.readOnly = false;
            qtyEl.disabled = false;
            priceEl.disabled = false;
            // 數量為數字 → 金額=數量×單價（覆寫）；文字 → 保留手填金額
            if (qtyIsNumeric(qtyEl.value)) {
                const qty = Number(String(qtyEl.value).replace(/,/g,'')) || 0;
                const price = parseFloat(priceEl.value) || 0;
                amountEl.value = qty * price;
                amountEl.readOnly = true;   // 數字數量時金額由公式控制
            } else {
                amountEl.readOnly = false;  // 文字數量允許手填
            }
        }
        calcAll();
    }

    qtyEl.addEventListener('input', recalcRow);
    priceEl.addEventListener('input', recalcRow);
    amountEl.addEventListener('input', calcAll);
    giftEl.addEventListener('change', recalcRow);
    tr.querySelector('.del-item-btn').addEventListener('click', () => {
        tr.remove();
        calcAll();
    });

    // 品項打字搜尋庫存
    let itemTimeout = null;
    nameEl.addEventListener('input', function() {
        clearTimeout(itemTimeout);
        warn.textContent = '';
        const qv = this.value.trim();
        if (qv.length < 1) { dd.style.display = 'none'; dd.innerHTML = ''; return; }
        itemTimeout = setTimeout(() => {
            fetch('/quotations/api/inventory-search?q=' + encodeURIComponent(qv))
                .then(r => r.json())
                .then(data => {
                    dd.innerHTML = '';
                    if (!data || data.length === 0) { dd.style.display = 'none'; return; }
                    data.forEach(it => {
                        const opt = document.createElement('button');
                        opt.type = 'button';
                        opt.className = 'list-group-item list-group-item-action text-start';
                        const badge = it.type === '冷氣' ? 'bg-warning text-dark' : 'bg-success';
                        opt.innerHTML = '<span class="fw-semibold">' + it.name + '</span>' +
                            ' <span class="badge ' + badge + ' ms-1">' + it.type + '</span>' +
                            ' <span class="text-muted small ms-1">庫存 ' + it.stock + '</span>';
                        opt.addEventListener('click', () => {
                            nameEl.value = it.name;
                            dd.style.display = 'none'; dd.innerHTML = '';
                            const stock = parseInt(it.stock) || 0;
                            warn.textContent = (stock <= 2) ? '⚠️ 庫存僅剩 ' + stock + '，請先叫貨' : '';
                        });
                        dd.appendChild(opt);
                    });
                    dd.style.display = 'block';
                })
                .catch(() => { dd.style.display = 'none'; });
        }, 300);
    });
    nameEl.addEventListener('blur', function() {
        setTimeout(() => { dd.style.display = 'none'; }, 200);
    });

    // 初次依預填狀態算一次
    recalcRow();
}

// 建立一個群組區塊；data 為預填物件（可選）
function buildGroup(data) {
    data = data || {};
    const wrap = document.createElement('div');
    wrap.className = 'group-block border rounded p-3 mb-3 bg-white';
    wrap.innerHTML = `
        <div class="row g-2 align-items-end mb-2">
            <div class="col-12 col-md-5">
                <label class="form-label fw-semibold mb-1">空間標題</label>
                <input type="text" class="form-control group-title" list="spaceOptions"
                       placeholder="客廳 / 主臥 / 自由輸入">
                <div class="mt-1 space-presets"></div>
            </div>
            <div class="col-12 col-md-5">
                <label class="form-label fw-semibold mb-1">群組備註</label>
                <input type="text" class="form-control group-note" placeholder="此空間備註">
            </div>
            <div class="col-12 col-md-2 text-md-end">
                <button type="button" class="btn btn-outline-danger del-group-btn w-100">
                    <i class="bi bi-trash"></i> 刪除空間
                </button>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-bordered align-middle mb-2">
                <thead class="table-light">
                    <tr>
                        <th style="min-width:180px;">品名 / 規格</th>
                        <th style="width:110px;" class="text-center">數量</th>
                        <th style="width:120px;" class="text-center">單價</th>
                        <th style="width:120px;" class="text-end">金額</th>
                        <th style="width:120px;">備註</th>
                        <th style="width:55px;" class="text-center">贈品</th>
                        <th style="width:55px;"></th>
                    </tr>
                </thead>
                <tbody class="items-tbody"></tbody>
            </table>
        </div>
        <div class="d-flex justify-content-between align-items-center">
            <button type="button" class="btn btn-sm btn-outline-primary add-item-btn">
                <i class="bi bi-plus-lg"></i> 新增品項
            </button>
            <div class="fw-semibold">空間小計：NT$ <span class="group-subtotal">0</span></div>
        </div>`;

    wrap.querySelector('.group-title').value = data.title || '';
    wrap.querySelector('.group-note').value = data.note || '';

    // 快速選空間標題按鈕
    const presetsBox = wrap.querySelector('.space-presets');
    SPACE_PRESETS.forEach(p => {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'btn btn-sm btn-outline-secondary me-1 mb-1 py-0';
        b.textContent = p;
        b.addEventListener('click', () => { wrap.querySelector('.group-title').value = p; });
        presetsBox.appendChild(b);
    });
    // 方案預設：附加到現有標題後（如「辦公室」+「方案一」→「辦公室 方案一」）
    PLAN_PRESETS.forEach(p => {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'btn btn-sm btn-outline-info me-1 mb-1 py-0';
        b.textContent = '+ ' + p;
        b.addEventListener('click', () => {
            const t = wrap.querySelector('.group-title');
            const cur = t.value.trim();
            t.value = cur ? (cur + ' ' + p) : p;
        });
        presetsBox.appendChild(b);
    });

    const tbody = wrap.querySelector('.items-tbody');
    const items = data.items && data.items.length ? data.items : [{}];
    items.forEach(it => tbody.appendChild(buildItemRow(it)));

    wrap.querySelector('.add-item-btn').addEventListener('click', () => {
        tbody.appendChild(buildItemRow({}));
        calcAll();
    });
    wrap.querySelector('.del-group-btn').addEventListener('click', () => {
        wrap.remove();
        calcAll();
    });

    return wrap;
}

document.getElementById('addGroupBtn').addEventListener('click', () => {
    groupsContainer.appendChild(buildGroup({}));
    calcAll();
});

// ====================================================
// 3. 全表合計（與後端 recompute 規則一致）
// ====================================================
function calcAll() {
    let pretax = 0;
    groupsContainer.querySelectorAll('.group-block').forEach(g => {
        let sub = 0;
        g.querySelectorAll('.item-row').forEach(tr => {
            const gift = tr.querySelector('.item-gift').checked;
            if (gift) return;
            const qtyRaw = tr.querySelector('.item-qty').value;
            let amount;
            if (qtyIsNumeric(qtyRaw)) {
                const qty = Number(String(qtyRaw).replace(/,/g,'')) || 0;
                const price = parseFloat(tr.querySelector('.item-price').value) || 0;
                amount = qty * price;
            } else {
                amount = parseFloat(tr.querySelector('.item-amount').value) || 0;
            }
            sub += amount;
        });
        g.querySelector('.group-subtotal').textContent = formatNumber(sub);
        pretax += sub;
    });
    const tax = Math.round(pretax * 0.05);
    const total = pretax + tax;
    document.getElementById('subtotal_display').textContent = formatNumber(pretax);
    document.getElementById('tax_display').textContent = formatNumber(tax);
    document.getElementById('total_display').textContent = 'NT$ ' + formatNumber(total);
}

// ====================================================
// 4. 序列化 → payload，送出前寫入 hidden input
// ====================================================
function serializePayload() {
    const groups = [];
    groupsContainer.querySelectorAll('.group-block').forEach(g => {
        const items = [];
        g.querySelectorAll('.item-row').forEach(tr => {
            const name = tr.querySelector('.item-name').value.trim();
            const qty_text = tr.querySelector('.item-qty').value.trim();
            if (!name && !qty_text) return;   // 跳過空白列
            items.push({
                name: name,
                qty_text: qty_text,
                unit_price: parseFloat(tr.querySelector('.item-price').value) || 0,
                amount: parseFloat(tr.querySelector('.item-amount').value) || 0,
                note: tr.querySelector('.item-note').value.trim(),
                is_gift: tr.querySelector('.item-gift').checked
            });
        });
        const title = g.querySelector('.group-title').value.trim();
        if (!title && items.length === 0) return;   // 跳過空白群組
        groups.push({
            title: title,
            note: g.querySelector('.group-note').value.trim(),
            items: items
        });
    });
    const payload = {
        company: document.getElementById('company_title').value,
        quote_date: document.getElementById('quote_date').value,
        customer_name: document.getElementById('customer_name').value.trim(),
        customer_phone: document.getElementById('customer_phone').value.trim(),
        customer_address: document.getElementById('customer_address').value.trim(),
        install_date: document.getElementById('install_date').value,
        note: document.getElementById('notes').value.trim(),
        groups: groups
    };
    // edit.html 會設定 window.QUOTE_STATUS_EL，存在則帶上 status
    const statusEl = document.getElementById('status');
    if (statusEl) payload.status = statusEl.value;
    return payload;
}

document.getElementById('quotationForm').addEventListener('submit', function(e) {
    document.getElementById('payload').value = JSON.stringify(serializePayload());
});

// ====================================================
// 5. 客戶搜尋（debounce 300ms）
// ====================================================
let searchTimeout = null;
const searchInput = document.getElementById('customerSearch');
const dropdown = document.getElementById('customerDropdown');
searchInput.addEventListener('input', function() {
    clearTimeout(searchTimeout);
    const qv = this.value.trim();
    if (qv.length < 1) { dropdown.style.display = 'none'; dropdown.innerHTML = ''; return; }
    searchTimeout = setTimeout(() => {
        fetch('/quotations/api/customer-lookup?q=' + encodeURIComponent(qv))
            .then(r => r.json())
            .then(data => {
                dropdown.innerHTML = '';
                if (!data || data.length === 0) { dropdown.style.display = 'none'; return; }
                data.forEach(customer => {
                    const item = document.createElement('button');
                    item.type = 'button';
                    item.className = 'list-group-item list-group-item-action text-start';
                    item.innerHTML =
                        '<span class="fw-semibold">' + (customer['姓名'] || '') + '</span>' +
                        (customer['電話'] ? ' <span class="text-muted small ms-2">' + customer['電話'] + '</span>' : '') +
                        (customer['地址'] ? '<br><small class="text-muted">' + customer['地址'] + '</small>' : '');
                    item.addEventListener('click', () => {
                        document.getElementById('customer_name').value = customer['姓名'] || '';
                        document.getElementById('customer_phone').value = customer['電話'] || '';
                        document.getElementById('customer_address').value = customer['地址'] || '';
                        searchInput.value = customer['姓名'] || '';
                        dropdown.style.display = 'none'; dropdown.innerHTML = '';
                    });
                    dropdown.appendChild(item);
                });
                dropdown.style.display = 'block';
            })
            .catch(() => { dropdown.style.display = 'none'; });
    }, 300);
});
document.addEventListener('click', function(e) {
    if (!searchInput.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.style.display = 'none';
    }
});

// ====================================================
// 6. 初始化：載入既有群組或預設一個空群組
// ====================================================
(function init() {
    if (window.INITIAL_GROUPS && window.INITIAL_GROUPS.length) {
        window.INITIAL_GROUPS.forEach(g => groupsContainer.appendChild(buildGroup(g)));
    } else {
        groupsContainer.appendChild(buildGroup({}));
    }
    calcAll();
})();
</script>
{% endblock %}
