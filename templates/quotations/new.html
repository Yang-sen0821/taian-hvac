{% extends "base.html" %}

{% block title %}新增報價單 — 泰安冷氣{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0"><i class="bi bi-file-earmark-plus"></i> 新增報價單</h2>
    <a href="/quotations/" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> 返回列表
    </a>
</div>

<form method="POST" action="/quotations/new" id="quotationForm">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}">

    <!-- Section 1：報價資訊 -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-light fw-semibold">
            <i class="bi bi-info-circle"></i> 報價資訊
        </div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-12 col-md-4">
                    <label for="quote_date" class="form-label fw-semibold">報價日期 <span class="text-danger">*</span></label>
                    <input type="date" class="form-control form-control-lg" id="quote_date" name="quote_date"
                           value="{{ today }}" required>
                </div>
                <div class="col-12 col-md-4">
                    <label for="company_title" class="form-label fw-semibold">公司抬頭</label>
                    <select class="form-select form-control-lg" id="company_title" name="company_title"
                            style="font-size: 1rem; padding: .5rem .75rem;">
                        <option value="">— 請選擇公司 —</option>
                        {% for c in companies %}
                        <option value="{{ c.name }}" data-tax-id="{{ c.tax_id }}">{{ c.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12 col-md-4">
                    <label for="tax_id" class="form-label fw-semibold">統一編號</label>
                    <input type="text" class="form-control form-control-lg" id="tax_id" name="tax_id"
                           placeholder="選擇公司後自動填入" readonly>
                </div>
            </div>
        </div>
    </div>

    <!-- Section 2：客戶資訊 -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-light fw-semibold">
            <i class="bi bi-person"></i> 客戶資訊
        </div>
        <div class="card-body">
            <!-- 客戶搜尋 -->
            <div class="mb-3 position-relative">
                <label for="customerSearch" class="form-label fw-semibold">搜尋現有客戶</label>
                <input type="text" class="form-control form-control-lg" id="customerSearch"
                       placeholder="輸入姓名或電話搜尋..." autocomplete="off">
                <div id="customerDropdown"
                     class="list-group position-absolute w-100 shadow-sm"
                     style="z-index: 1000; display: none; max-height: 220px; overflow-y: auto;">
                </div>
                <small class="text-muted">選擇後自動填入下方欄位，或直接手動輸入</small>
            </div>

            <div class="row g-3">
                <div class="col-12 col-md-4">
                    <label for="customer_name" class="form-label fw-semibold">客戶姓名 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control form-control-lg" id="customer_name"
                           name="customer_name" placeholder="王小明" required>
                </div>
                <div class="col-12 col-md-4">
                    <label for="customer_phone" class="form-label fw-semibold">客戶電話</label>
                    <input type="text" class="form-control form-control-lg" id="customer_phone"
                           name="customer_phone" placeholder="0912-345-678">
                </div>
                <div class="col-12 col-md-4">
                    <label for="customer_address" class="form-label fw-semibold">客戶地址</label>
                    <input type="text" class="form-control form-control-lg" id="customer_address"
                           name="customer_address" placeholder="台中市...">
                </div>
            </div>
        </div>
    </div>

    <!-- Section 3：品項明細 -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-light fw-semibold">
            <i class="bi bi-list-ul"></i> 品項明細
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th style="min-width: 200px;">品名 / 規格</th>
                            <th style="width: 110px;" class="text-center">數量</th>
                            <th style="width: 140px;" class="text-center">單價 (NT$)</th>
                            <th style="width: 140px;" class="text-end">小計 (NT$)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 品項 1 -->
                        <tr>
                            <td>
                                <input type="text" class="form-control" id="item1_name" name="item1_name"
                                       placeholder="品名或規格">
                            </td>
                            <td>
                                <input type="number" class="form-control text-center item-qty" id="item1_qty"
                                       name="item1_qty" min="0" step="1" value="0"
                                       data-row="1">
                            </td>
                            <td>
                                <input type="number" class="form-control text-end item-price" id="item1_price"
                                       name="item1_price" min="0" step="1" value="0"
                                       data-row="1">
                            </td>
                            <td class="text-end fw-semibold">
                                <span id="item1_subtotal" class="text-muted">0</span>
                            </td>
                        </tr>
                        <!-- 品項 2 -->
                        <tr>
                            <td>
                                <input type="text" class="form-control" id="item2_name" name="item2_name"
                                       placeholder="品名或規格">
                            </td>
                            <td>
                                <input type="number" class="form-control text-center item-qty" id="item2_qty"
                                       name="item2_qty" min="0" step="1" value="0"
                                       data-row="2">
                            </td>
                            <td>
                                <input type="number" class="form-control text-end item-price" id="item2_price"
                                       name="item2_price" min="0" step="1" value="0"
                                       data-row="2">
                            </td>
                            <td class="text-end fw-semibold">
                                <span id="item2_subtotal" class="text-muted">0</span>
                            </td>
                        </tr>
                        <!-- 品項 3 -->
                        <tr>
                            <td>
                                <input type="text" class="form-control" id="item3_name" name="item3_name"
                                       placeholder="品名或規格">
                            </td>
                            <td>
                                <input type="number" class="form-control text-center item-qty" id="item3_qty"
                                       name="item3_qty" min="0" step="1" value="0"
                                       data-row="3">
                            </td>
                            <td>
                                <input type="number" class="form-control text-end item-price" id="item3_price"
                                       name="item3_price" min="0" step="1" value="0"
                                       data-row="3">
                            </td>
                            <td class="text-end fw-semibold">
                                <span id="item3_subtotal" class="text-muted">0</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Section 4：費用小計 -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-light fw-semibold">
            <i class="bi bi-calculator"></i> 費用小計
        </div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-12 col-md-6">
                    <label for="engineering" class="form-label fw-semibold">工程費 (NT$)</label>
                    <input type="number" class="form-control form-control-lg text-end" id="engineering"
                           name="engineering" min="0" step="1" value="0">
                </div>
                <div class="col-12 col-md-6">
                    <label for="other" class="form-label fw-semibold">其他費用 (NT$)</label>
                    <input type="number" class="form-control form-control-lg text-end" id="other"
                           name="other" min="0" step="1" value="0">
                </div>
            </div>

            <hr class="my-4">

            <!-- 合計區 -->
            <div class="row justify-content-end">
                <div class="col-12 col-md-5">
                    <table class="table table-sm mb-0">
                        <tbody>
                            <tr>
                                <td class="text-muted">未稅合計</td>
                                <td class="text-end fw-semibold">
                                    NT$ <span id="subtotal_display">0</span>
                                    <input type="hidden" id="subtotal" name="subtotal" value="0">
                                </td>
                            </tr>
                            <tr>
                                <td class="text-muted">稅額 5%</td>
                                <td class="text-end fw-semibold">
                                    NT$ <span id="tax_display">0</span>
                                    <input type="hidden" id="tax_amount" name="tax_amount" value="0">
                                </td>
                            </tr>
                            <tr class="table-light border-top">
                                <td class="fw-bold">含稅總金額</td>
                                <td class="text-end">
                                    <span id="total_display"
                                          style="font-size: 1.6rem; font-weight: 700; color: #dc3545;">
                                        NT$ 0
                                    </span>
                                    <input type="hidden" id="total_with_tax" name="total_with_tax" value="0">
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Section 5：其他資訊 -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-light fw-semibold">
            <i class="bi bi-calendar-event"></i> 其他資訊
        </div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-12 col-md-4">
                    <label for="install_date" class="form-label fw-semibold">預計安裝日期</label>
                    <input type="date" class="form-control form-control-lg" id="install_date"
                           name="install_date">
                </div>
                <div class="col-12 col-md-8">
                    <label for="notes" class="form-label fw-semibold">備註</label>
                    <textarea class="form-control" id="notes" name="notes" rows="3"
                              placeholder="其他注意事項或說明..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- 送出按鈕 -->
    <div class="d-grid d-md-flex justify-content-md-end gap-2 mb-5">
        <a href="/quotations/" class="btn btn-outline-secondary btn-lg">取消</a>
        <button type="submit" class="btn btn-primary btn-lg px-5">
            <i class="bi bi-check-lg"></i> 建立報價單
        </button>
    </div>
</form>

<script>
// ====================================================
// 1. 公司切換 → 統編自動填入
// ====================================================
const companies = {{ companies|tojson }};

document.getElementById('company_title').addEventListener('change', function() {
    const selected = this.value;
    const taxIdInput = document.getElementById('tax_id');
    if (!selected) {
        taxIdInput.value = '';
        return;
    }
    const company = companies.find(c => c.name === selected);
    taxIdInput.value = company ? (company.tax_id || '') : '';
});

// ====================================================
// 2. 品項即時計算
// ====================================================
function formatNumber(n) {
    return n.toLocaleString('zh-TW');
}

function calcAll() {
    let itemsTotal = 0;

    for (let i = 1; i <= 3; i++) {
        const qty   = parseFloat(document.getElementById('item' + i + '_qty').value)   || 0;
        const price = parseFloat(document.getElementById('item' + i + '_price').value) || 0;
        const sub   = qty * price;
        itemsTotal += sub;

        const subtotalEl = document.getElementById('item' + i + '_subtotal');
        subtotalEl.textContent = formatNumber(sub);
        subtotalEl.classList.toggle('text-muted', sub === 0);
    }

    const engineering = parseFloat(document.getElementById('engineering').value) || 0;
    const other       = parseFloat(document.getElementById('other').value)       || 0;

    const subtotal    = itemsTotal + engineering + other;
    const tax         = Math.round(subtotal * 0.05);
    const total       = subtotal + tax;

    document.getElementById('subtotal_display').textContent = formatNumber(subtotal);
    document.getElementById('tax_display').textContent      = formatNumber(tax);
    document.getElementById('total_display').textContent    = 'NT$ ' + formatNumber(total);

    // hidden fields for form submission
    document.getElementById('subtotal').value      = subtotal;
    document.getElementById('tax_amount').value    = tax;
    document.getElementById('total_with_tax').value = total;
}

// 監聽所有數量、單價、費用欄位
document.querySelectorAll('.item-qty, .item-price, #engineering, #other')
    .forEach(el => el.addEventListener('input', calcAll));

calcAll(); // 初始計算

// ====================================================
// 3. 客戶搜尋（debounce 300ms）
// ====================================================
let searchTimeout = null;

const searchInput    = document.getElementById('customerSearch');
const dropdown       = document.getElementById('customerDropdown');

searchInput.addEventListener('input', function() {
    clearTimeout(searchTimeout);
    const q = this.value.trim();

    if (q.length < 1) {
        dropdown.style.display = 'none';
        dropdown.innerHTML = '';
        return;
    }

    searchTimeout = setTimeout(() => {
        fetch('/quotations/api/customer-lookup?q=' + encodeURIComponent(q))
            .then(r => r.json())
            .then(data => {
                dropdown.innerHTML = '';
                if (!data || data.length === 0) {
                    dropdown.style.display = 'none';
                    return;
                }
                data.forEach(customer => {
                    const item = document.createElement('button');
                    item.type = 'button';
                    item.className = 'list-group-item list--group-item-action text-start';
                    item.innerHTML =
                        '<span class="fw-semibold">' + (customer.name || '') + '</span>' +
                        (customer.phone ? ' <span class="text-muted small ms-2">' + customer.phone + '</span>' : '') +
                        (customer.address ? '<br><small class="text-muted">' + customer.address + '</small>' : '');

                    item.addEventListener('click', () => {
                        document.getElementById('customer_name').value    = customer.name    || '';
                        document.getElementById('customer_phone').value   = customer.phone   || '';
                        document.getElementById('customer_address').value = customer.address || '';
                        searchInput.value = customer.name || '';
                        dropdown.style.display = 'none';
                        dropdown.innerHTML = '';
                    });

                    dropdown.appendChild(item);
                });
                dropdown.style.display = 'block';
            })
            .catch(() => {
                dropdown.style.display = 'none';
            });
    }, 300);
});

// 點擊其他地方關閉下拉
document.addEventListener('click', function(e) {
    if (!searchInput.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.style.display = 'none';
    }
});
</script>
{% endblock %}
