<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>連結已失效</title>
    <style>
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; background: #f5f5f5;
               display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .box { background: #fff; border-radius: 12px; padding: 40px 32px; text-align: center;
               box-shadow: 0 4px 20px rgba(0,0,0,.08); max-width: 360px; margin: 16px; }
        .box .icon { font-size: 48px; }
        .box h1 { font-size: 20px; margin: 16px 0 8px; color: #333; }
        .box p { font-size: 14px; color: #777; line-height: 1.7; }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon">🔒</div>
        <h1>此簽名連結已失效</h1>
        <p>連結可能已完成簽署、已過期（7 天）或已被重新產生。<br>如需重新簽署，請聯絡承辦人員索取新的連結。</p>
    </div>
</body>
</html>
